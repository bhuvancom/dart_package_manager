name: Auto Tag

on:
  push:
    branches: [ master ]

jobs:
  create_tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.repository == 'bhuvancom/dart_package_manager'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_PAT || secrets.GITHUB_TOKEN }}

      - name: Extract Version
        id: get_version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Create and Push Tag
        env:
          MY_PAT: ${{ secrets.MY_PAT }}
        run: |
          VERSION="v${{ steps.get_version.outputs.version }}"
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists. Skipping."
          else
            echo "Creating tag $VERSION"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$VERSION"
            if [ -n "$MY_PAT" ]; then
              echo "Pushing tag using MY_PAT..."
              git push https://$MY_PAT@github.com/${{ github.repository }}.git "$VERSION"
            else
              echo "MY_PAT not found, pushing using default GITHUB_TOKEN (will not trigger downstream workflows)..."
              git push origin "$VERSION"
            fi
          fi
